{% extends "base.html" %}

{% block title %}設定 - AIダイアリー{% endblock %}

{% block content %}
<main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <h2 class="text-xl font-semibold text-gray-900 mb-6">プロンプト設定</h2>

    <!-- デイリー日記清書プロンプト -->
    <div class="bg-white border border-gray-300 rounded-lg p-6 mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2">デイリー日記清書プロンプト</label>
        <textarea 
            id="daily-prompt" 
            class="w-full h-48 p-2 border border-gray-300 rounded-lg resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="デイリー日記を清書するためのプロンプトを入力してください"
        >{{ daily_prompt }}</textarea>
    </div>

    <!-- ウィークリー要約プロンプト -->
    <div class="bg-white border border-gray-300 rounded-lg p-6 mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2">ウィークリー要約プロンプト</label>
        <textarea 
            id="weekly-prompt" 
            class="w-full h-48 p-2 border border-gray-300 rounded-lg resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="ウィークリー要約を作成するためのプロンプトを入力してください"
        >{{ weekly_prompt }}</textarea>
    </div>

    <!-- マンスリー要約プロンプト -->
    <div class="bg-white border border-gray-300 rounded-lg p-6 mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2">マンスリー要約プロンプト</label>
        <textarea 
            id="monthly-prompt" 
            class="w-full h-48 p-2 border border-gray-300 rounded-lg resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="マンスリー要約を作成するためのプロンプトを入力してください"
        >{{ monthly_prompt }}</textarea>
    </div>

    <!-- イヤリー要約プロンプト -->
    <div class="bg-white border border-gray-300 rounded-lg p-6 mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2">イヤリー要約プロンプト</label>
        <textarea 
            id="yearly-prompt" 
            class="w-full h-48 p-2 border border-gray-300 rounded-lg resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="イヤリー要約を作成するためのプロンプトを入力してください"
        >{{ yearly_prompt }}</textarea>
    </div>

    <!-- 登録ボタン -->
    <div class="flex justify-end">
        <button id="save-button" class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors font-semibold text-lg cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed flex items-center">
            <svg id="loading-spinner" class="hidden animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span id="button-text">登録</span>
        </button>
    </div>
</main>

<!-- 登録完了ダイアログ -->
<div id="success-dialog" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg p-8 max-w-md mx-4">
        <div class="text-center">
            <h3 class="text-xl font-semibold text-gray-900 mb-2">登録完了</h3>
            <p class="text-gray-600 mb-6">プロンプト設定を保存しました。</p>
            <button id="close-success-dialog-button" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors font-medium cursor-pointer">
                閉じる
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    const saveButton = document.getElementById('save-button');
    const successDialog = document.getElementById('success-dialog');
    const closeSuccessDialogButton = document.getElementById('close-success-dialog-button');

    // 登録ボタンのクリックイベント
    saveButton.addEventListener('click', async function() {
        const loadingSpinner = document.getElementById('loading-spinner');
        const buttonText = document.getElementById('button-text');
        
        // ローディング状態に変更
        saveButton.disabled = true;
        loadingSpinner.classList.remove('hidden');
        buttonText.textContent = '登録中...';
        
        const dailyPrompt = document.getElementById('daily-prompt').value;
        const weeklyPrompt = document.getElementById('weekly-prompt').value;
        const monthlyPrompt = document.getElementById('monthly-prompt').value;
        const yearlyPrompt = document.getElementById('yearly-prompt').value;
        
        // フォームデータを作成
        const formData = new FormData();
        formData.append('daily_prompt', dailyPrompt);
        formData.append('weekly_prompt', weeklyPrompt);
        formData.append('monthly_prompt', monthlyPrompt);
        formData.append('yearly_prompt', yearlyPrompt);
        
        try {
            // POSTリクエストを送信
            const response = await fetch('/config', {
                method: 'POST',
                body: formData
            });
            
            const result = await response.json();
            
            if (result.status === 'success') {
                // 登録完了ダイアログを表示
                successDialog.classList.remove('hidden');
            } else {
                alert('エラーが発生しました: ' + (result.message || '不明なエラー'));
            }
        } catch (error) {
            console.error('エラー:', error);
            alert('エラーが発生しました: ' + error.message);
        } finally {
            // ローディング状態を解除
            saveButton.disabled = false;
            loadingSpinner.classList.add('hidden');
            buttonText.textContent = '登録';
        }
    });

    // ダイアログを閉じる
    closeSuccessDialogButton.addEventListener('click', function() {
        successDialog.classList.add('hidden');
    });

    // ダイアログの背景をクリックしても閉じる
    successDialog.addEventListener('click', function(e) {
        if (e.target === successDialog) {
            successDialog.classList.add('hidden');
        }
    });
</script>
{% endblock %}
