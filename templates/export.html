{% extends "base.html" %}

{% block title %}エクスポート - AIダイアリー{% endblock %}

{% block content %}
<main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- エクスポート説明 -->
    <div class="bg-white border border-gray-300 rounded-lg p-6 mb-6">
        <p class="text-gray-700 mb-4">完了済みの日記データを静的HTMLファイルとしてエクスポートします。</p>
        <p class="text-sm text-gray-600">エクスポートされたファイルは、アプリケーションのルートディレクトリに <code class="bg-gray-100 px-2 py-1 rounded">export.html</code> として保存されます。</p>
    </div>

    <!-- エクスポートボタン -->
    <div class="flex justify-center">
        <button id="export-button" class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors font-semibold text-lg cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed flex items-center">
            <svg id="loading-spinner" class="hidden animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span id="button-text">エクスポート</span>
        </button>
    </div>
</main>

<!-- エクスポート完了ダイアログ -->
<div id="success-dialog" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg p-8 max-w-md mx-4">
        <div class="text-center">
            <h3 class="text-xl font-semibold text-gray-900 mb-2">エクスポート完了</h3>
            <p id="success-message" class="text-gray-600 mb-6">日記データをエクスポートしました。</p>
            <button id="close-success-dialog-button" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors font-medium cursor-pointer">
                閉じる
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    const exportButton = document.getElementById('export-button');
    const successDialog = document.getElementById('success-dialog');
    const successMessage = document.getElementById('success-message');
    const closeSuccessDialogButton = document.getElementById('close-success-dialog-button');

    // エクスポートボタンのクリックイベント
    exportButton.addEventListener('click', async function() {
        const loadingSpinner = document.getElementById('loading-spinner');
        const buttonText = document.getElementById('button-text');
        
        // ローディング状態に変更
        exportButton.disabled = true;
        loadingSpinner.classList.remove('hidden');
        buttonText.textContent = 'エクスポート中...';
        
        try {
            // GETリクエストを送信
            const response = await fetch('/api/export', {
                method: 'GET'
            });
            
            const result = await response.json();
            
            if (result.status === 'success') {
                // エクスポート完了ダイアログを表示
                successMessage.textContent = result.message || '日記データをエクスポートしました。';
                successDialog.classList.remove('hidden');
            } else {
                alert('エラーが発生しました: ' + (result.message || '不明なエラー'));
            }
        } catch (error) {
            console.error('エラー:', error);
            alert('エラーが発生しました: ' + error.message);
        } finally {
            // ローディング状態を解除
            exportButton.disabled = false;
            loadingSpinner.classList.add('hidden');
            buttonText.textContent = 'エクスポート';
        }
    });

    // ダイアログを閉じる
    closeSuccessDialogButton.addEventListener('click', function() {
        successDialog.classList.add('hidden');
    });

    // ダイアログの背景をクリックしても閉じる
    successDialog.addEventListener('click', function(e) {
        if (e.target === successDialog) {
            successDialog.classList.add('hidden');
        }
    });
</script>
{% endblock %}
