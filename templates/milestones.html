{% extends "base.html" %}

{% block title %}日記検索 - AIダイアリー{% endblock %}

{% block content %}
<main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- 検索条件 -->
    <div class="bg-white border border-gray-300 rounded-lg p-6 mb-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">検索条件</h2>
        
        <!-- 種別選択 -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">種別</label>
            <div class="flex space-x-2">
                <button type="button" data-type="daily" class="type-button px-4 py-2 bg-blue-600 text-white rounded-lg font-medium transition-colors cursor-pointer">
                    デイリー
                </button>
                <button type="button" data-type="weekly" class="type-button px-4 py-2 bg-gray-200 text-gray-700 rounded-lg font-medium hover:bg-gray-300 transition-colors cursor-pointer">
                    ウィークリー
                </button>
                <button type="button" data-type="monthly" class="type-button px-4 py-2 bg-gray-200 text-gray-700 rounded-lg font-medium hover:bg-gray-300 transition-colors cursor-pointer">
                    マンスリー
                </button>
                <button type="button" data-type="yearly" class="type-button px-4 py-2 bg-gray-200 text-gray-700 rounded-lg font-medium hover:bg-gray-300 transition-colors cursor-pointer">
                    イヤリー
                </button>
            </div>
        </div>

        <!-- 期間選択 -->
        <div class="flex items-end space-x-4">
            <div class="flex-1">
                <label class="block text-sm font-medium text-gray-700 mb-2">開始日</label>
                <input type="date" id="start-date" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>
            <div class="flex-1">
                <label class="block text-sm font-medium text-gray-700 mb-2">終了日</label>
                <input type="date" id="end-date" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>
            <div>
                <button id="search-button" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors font-medium cursor-pointer">
                    検索
                </button>
            </div>
        </div>
    </div>

    <!-- 検索結果 -->
    <div class="space-y-4">
        <h2 class="text-lg font-semibold text-gray-900">検索結果</h2>
        <div id="search-results" class="space-y-4">
            <!-- 検索結果がここに動的に表示されます -->
        </div>
        <div id="no-results" class="hidden text-center py-8 text-gray-500">
            検索結果がありません
        </div>
        <div id="search-loading" class="hidden text-center py-8 text-gray-500">
            検索中...
        </div>
        <div id="truncated-message" class="hidden bg-yellow-50 border border-yellow-200 rounded-lg p-4 text-yellow-800 text-sm">
            検索結果が10件を超えるため、最新の10件のみ表示しています。
        </div>
    </div>
</main>
{% endblock %}

{% block extra_scripts %}
<script>
    let selectedType = 'daily'; // デフォルトはデイリー

    // 日付をYYYY-MM-DD形式にフォーマットする関数
    function formatDate(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    // 種別に応じて開始日と終了日を設定する関数
    function setDatesByType(type) {
        const today = new Date();
        const endDate = formatDate(today);
        let startDate;

        switch(type) {
            case 'daily':
                // 本日 - 10日
                const dailyDate = new Date(today);
                dailyDate.setDate(today.getDate() - 9);
                startDate = formatDate(dailyDate);
                break;
            case 'weekly':
                // 本日 - 10週間（70日）
                const weeklyDate = new Date(today);
                weeklyDate.setDate(today.getDate() - 70);
                startDate = formatDate(weeklyDate);
                break;
            case 'monthly':
                // 本日 - 10ヶ月
                const monthlyDate = new Date(today);
                monthlyDate.setMonth(today.getMonth() - 10);
                startDate = formatDate(monthlyDate);
                break;
            case 'yearly':
                // 本日 - 10年
                const yearlyDate = new Date(today);
                yearlyDate.setFullYear(today.getFullYear() - 10);
                startDate = formatDate(yearlyDate);
                break;
            default:
                startDate = endDate;
        }

        document.getElementById('start-date').value = startDate;
        document.getElementById('end-date').value = endDate;
    }

    // 種別ボタンのクリックイベント
    document.querySelectorAll('.type-button').forEach(button => {
        button.addEventListener('click', function() {
            // すべてのボタンのスタイルをリセット
            document.querySelectorAll('.type-button').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('bg-gray-200', 'text-gray-700');
            });
            
            // クリックされたボタンをアクティブにする
            this.classList.remove('bg-gray-200', 'text-gray-700');
            this.classList.add('bg-blue-600', 'text-white');
            
            // 選択された種別を保存
            selectedType = this.getAttribute('data-type');
            
            // 種別に応じて日付を自動設定
            setDatesByType(selectedType);
        });
    });

    // 検索結果を表示する関数
    function displaySearchResults(results, isTruncated) {
        const resultsContainer = document.getElementById('search-results');
        const noResults = document.getElementById('no-results');
        const loading = document.getElementById('search-loading');
        const truncatedMessage = document.getElementById('truncated-message');
        
        // ローディングを非表示
        loading.classList.add('hidden');
        
        // 既存の結果をクリア
        resultsContainer.innerHTML = '';
        
        if (results.length === 0) {
            // 結果がない場合
            noResults.classList.remove('hidden');
            truncatedMessage.classList.add('hidden');
            return;
        }
        
        // 結果がある場合
        noResults.classList.add('hidden');
        
        // 切り捨てメッセージの表示/非表示
        if (isTruncated) {
            truncatedMessage.classList.remove('hidden');
        } else {
            truncatedMessage.classList.add('hidden');
        }
        
        // 各結果をカードとして表示
        results.forEach(result => {
            const card = document.createElement('div');
            card.className = 'bg-white border border-gray-300 rounded-lg overflow-hidden';
            
            const header = document.createElement('div');
            header.className = 'bg-gray-200 px-4 py-2';
            
            const dateLabel = document.createElement('div');
            dateLabel.className = 'text-sm font-medium text-gray-700';
            dateLabel.textContent = result.date_jp;
            header.appendChild(dateLabel);
            
            const content = document.createElement('div');
            content.className = 'p-6';
            
            const contentText = document.createElement('div');
            contentText.className = 'text-gray-900 whitespace-pre-wrap';
            contentText.textContent = result.content || '（内容なし）';
            content.appendChild(contentText);
            
            card.appendChild(header);
            card.appendChild(content);
            resultsContainer.appendChild(card);
        });
    }

    // 検索処理を実行する関数
    function performSearch() {
        const startDate = document.getElementById('start-date').value;
        const endDate = document.getElementById('end-date').value;
        
        // 日付のバリデーション
        if (!startDate || !endDate) {
            return;
        }
        
        // ローディング表示
        const loading = document.getElementById('search-loading');
        const noResults = document.getElementById('no-results');
        const truncatedMessage = document.getElementById('truncated-message');
        loading.classList.remove('hidden');
        noResults.classList.add('hidden');
        truncatedMessage.classList.add('hidden');
        
        // API呼び出し
        const url = `/api/search?type=${selectedType}&start_date=${startDate}&end_date=${endDate}`;
        
        fetch(url)
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    displaySearchResults(data.results, data.is_truncated || false);
                } else {
                    alert('検索中にエラーが発生しました: ' + (data.message || '不明なエラー'));
                    loading.classList.add('hidden');
                }
            })
            .catch(error => {
                console.error('検索エラー:', error);
                alert('検索中にエラーが発生しました');
                loading.classList.add('hidden');
            });
    }

    // 検索ボタンのクリックイベント
    document.getElementById('search-button').addEventListener('click', function() {
        performSearch();
    });

    // ページ読み込み時にデフォルトでデイリーの日付を設定し、検索結果を自動表示
    setDatesByType('daily');
    // 日付が設定された後に検索を実行
    setTimeout(function() {
        performSearch();
    }, 100);
</script>
{% endblock %}
